# Add these entries to the user-level ~/.codex/config.toml.
# Replace /ABSOLUTE/PATH/TO with the directory containing the installed
# tele-codex console scripts (for example, the project's .venv/bin directory).
# Codex ignores `notify` in project-level .codex/config.toml files.

notify = [
  "/ABSOLUTE/PATH/TO/tele-codex"
]

[[hooks.PermissionRequest]]
matcher = ".*"

[[hooks.PermissionRequest.hooks]]
type = "command"
command = '"/ABSOLUTE/PATH/TO/tele-codex"'
timeout = 20

[[hooks.PreToolUse]]
matcher = "^request_user_input$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = '"/ABSOLUTE/PATH/TO/tele-codex"'
timeout = 20
